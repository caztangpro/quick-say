      <stop offset="1" stop-color="#c56f2f"/>
    </linearGradient>
    <linearGradient id="wave-gradient" x1="251" y1="66" x2="310" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#59d7bf"/>
      <stop offset="1" stop-color="#365f9d"/>
    </linearGradient>
    <filter id="soft-shadow" x="0" y="0" width="280" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#172027" flood-opacity="0.18"/>
    </filter>
  </defs>
