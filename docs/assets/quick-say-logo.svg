<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Quick Say logo</title>
  <desc id="desc">A rounded microphone mark with voice waves beside the Quick Say wordmark.</desc>
  <defs>
